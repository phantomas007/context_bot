name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "▶ [0/5] Проверка .env (APP_ENV/APP_DEBUG/NGINX_SERVER_NAME)..."
            grep -qE "^APP_ENV=" .env 2>/dev/null \
              && sed -i 's/^APP_ENV=.*/APP_ENV=prod/' .env \
              || echo "APP_ENV=prod" >> .env
            grep -qE "^APP_DEBUG=" .env 2>/dev/null \
              && sed -i 's/^APP_DEBUG=.*/APP_DEBUG=0/' .env \
              || echo "APP_DEBUG=0" >> .env
            grep -qE "^NGINX_SERVER_NAME=" .env 2>/dev/null \
              || echo "NGINX_SERVER_NAME=_" >> .env

            echo "▶ [1/5] git pull..."

            git pull origin main

            echo "▶ [2/5] Сборка образа PHP..."
            docker compose build php

            echo "▶ [3/5] Перезапуск контейнеров..."
            docker compose up -d

            echo "▶ [4/5] Установка зависимостей Composer..."
            make composer-install ENV=prod

            echo "▶ [5/5] Миграции + прогрев кеша..."
            make migrate ENV=prod
            make console CMD="cache:warmup" ENV=prod

            echo "✔ Деплой завершён"
